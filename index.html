// ── CURSOR ────────────────────────────────────────────
function useCursor() {
  useEffect(() => {
    const cursor = document.getElementById('cursor');
    const ring   = document.getElementById('cursor-ring');
    let mx=0,my=0,rx=0,ry=0;
    const move = e => { mx=e.clientX; my=e.clientY; cursor.style.left=mx+'px'; cursor.style.top=my+'px'; };
    const raf = () => { rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(raf); };
    const over = e => { if(e.target.closest('a,button,[data-hover]')){ ring.style.transform='translate(-50%,-50%) scale(2)'; ring.style.opacity='0.6'; } };
    const out  = () => { ring.style.transform='translate(-50%,-50%) scale(1)'; ring.style.opacity='1'; };
    document.addEventListener('mousemove',move);
    document.addEventListener('mouseover',over);
    document.addEventListener('mouseout',out);
    requestAnimationFrame(raf);
    return ()=>{ document.removeEventListener('mousemove',move); document.removeEventListener('mouseover',over); document.removeEventListener('mouseout',out); };
  },[]);
}

// ── TYPEWRITER ────────────────────────────────────────

  return (
    <div style={{background:'var(--code-bg)',border:'1px solid var(--border)',borderRadius:14,padding:'20px 24px',fontFamily:'JetBrains Mono,monospace',fontSize:'0.78rem',lineHeight:1.8,minHeight:220,position:'relative',overflow:'hidden'}}>

        {['#ff5f57','#febc2e','#28c840'].map(c=><div key={c} style={{width:10,height:10,borderRadius:'50%',background:c}}/>)}
        <span style={{marginLeft:8,fontSize:'0.65rem',color:'var(--muted)',letterSpacing:'0.1em'}}>terminal — zsh</span>
      </div>
      {visible.map((l,i)=>(
        <div key={i} style={{color:colorMap[l.color]||'var(--text)',display:'flex',alignItems:'center',gap:6}}>
          <span>{l.txt}</span>
          {i===visible.length-1 && l.txt.endsWith('_') && <span style={{display:'inline-block',width:8,height:14,background:'var(--accent)',animation:'blink 1s step-end infinite'}}/>}
        </div>
      ))}
      <style>{`@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}`}</style>
    </div>
  );
}

// ── GLASS CARD ────────────────────────────────────────
function Glass({children,style={},className='',hover=true,...p}){
  const [hov,setHov]=useState(false);
  return (
    <div
      onMouseEnter={()=>hover&&setHov(true)}
      onMouseLeave={()=>setHov(false)}
      style={{
        background: hov ? 'rgba(255,255,255,0.065)' : 'var(--surface)',
        border:`1px solid ${hov?'var(--border-h)':'var(--border)'}`,
        backdropFilter:'blur(18px)',WebkitBackdropFilter:'blur(18px)',
        borderRadius:18,
        transition:'all 0.25s ease',
        transform: hov ? 'translateY(-2px)' : 'none',
        boxShadow: hov ? '0 12px 40px rgba(0,0,0,0.25)' : 'none',
        ...style,
      }}
      {...p}
    >{children}</div>
  );
}

// ── TAG ───────────────────────────────────────────────
function Tag({children,accent=false}){
  const [h,setH]=useState(false);
  return (
    <span
      onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{
        display:'inline-block',
        fontSize:'0.67rem',padding:'3px 11px',borderRadius:7,cursor:'default',
        background: h ? 'var(--accent-bg)' : (accent?'var(--accent-bg)':'var(--tag-bg)'),
        border:`1px solid ${h?'var(--accent-b)':(accent?'var(--accent-b)':'var(--border)')}`,
        color: h||accent ? 'var(--accent)' : 'var(--muted2)',
        transition:'all 0.2s',
        transform: h?'scale(1.05)':'scale(1)',
      }}
    >{children}</span>
  );
}

// ── BTN ───────────────────────────────────────────────
function Btn({children,href,solid=false,onClick,style={}}){
  const [h,setH]=useState(false);
  const s={
    display:'inline-flex',alignItems:'center',gap:7,
    padding:'10px 22px',borderRadius:12,border:'none',cursor:'pointer',
    fontFamily:'JetBrains Mono,monospace',fontSize:'0.73rem',letterSpacing:'0.04em',
    textDecoration:'none',transition:'all 0.2s',
    transform: h?'translateY(-2px)':'translateY(0)',
    background: solid ? (h?'#72ffc3':'var(--accent)') : (h?'rgba(255,255,255,0.08)':'var(--surface)'),
    color: solid ? '#080c18' : 'var(--text)',
    border: solid?'none':'1px solid var(--border)',
    boxShadow: h && solid ? '0 0 24px var(--accent-b)' : (h?'0 4px 20px rgba(0,0,0,0.2)':'none'),
    ...style,
  };
  if(href) return <a href={href} target="_blank" rel="noopener" style={s} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} data-hover>{children}</a>;
  return <button style={s} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} onClick={onClick} data-hover>{children}</button>;
}

// ── THEME SWITCHER ────────────────────────────────────
function ThemeSwitcher({theme,setTheme}){
  const [open,setOpen]=useState(false);
  return (
    <div style={{position:'relative'}}>
      <button
        onClick={()=>setOpen(o=>!o)} data-hover
        style={{
          background:'var(--surface)',border:'1px solid var(--border)',
          borderRadius:10,padding:'7px 14px',cursor:'pointer',
          fontFamily:'JetBrains Mono',fontSize:'0.7rem',color:'var(--text)',
          display:'flex',alignItems:'center',gap:6,transition:'all 0.2s',
        }}
      >
        {THEMES.find(t=>t.id===theme)?.icon} theme
        <span style={{fontSize:'0.6rem',color:'var(--muted)'}}>{open?'▲':'▼'}</span>
      </button>
      {open && (
        <div style={{
          position:'absolute',top:'calc(100% + 8px)',right:0,
          background:'var(--bg2)',border:'1px solid var(--border)',
          borderRadius:12,padding:6,zIndex:200,minWidth:130,
          backdropFilter:'blur(20px)',boxShadow:'0 16px 40px rgba(0,0,0,0.4)',
        }}>
          {THEMES.map(t=>(
            <button key={t.id} onClick={()=>{setTheme(t.id);setOpen(false);}} data-hover
              style={{
                display:'flex',alignItems:'center',gap:10,width:'100%',
                padding:'9px 12px',borderRadius:8,border:'none',cursor:'pointer',
                background:theme===t.id?'var(--accent-bg)':'transparent',
                color:theme===t.id?'var(--accent)':'var(--text)',
                fontFamily:'JetBrains Mono',fontSize:'0.72rem',transition:'all 0.15s',
              }}
            >{t.icon} {t.label}</button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── NAV ───────────────────────────────────────────────
const NAV_ITEMS = ['home','about','skills','work','projects','education'];
function Nav({theme,setTheme,active}){
  const [scrolled,setScrolled]=useState(false);
  useEffect(()=>{
    const h=()=>setScrolled(window.scrollY>40);
    window.addEventListener('scroll',h);
    return ()=>window.removeEventListener('scroll',h);
  },[]);
  const scroll=id=>{ if(id==='home'){window.scrollTo({top:0,behavior:'smooth'});return;} document.getElementById(id)?.scrollIntoView({behavior:'smooth'}); };
  return (
    <nav style={{
      position:'fixed',top:0,left:0,right:0,zIndex:100,
      height:58,display:'flex',alignItems:'center',justifyContent:'space-between',
      padding:'0 28px',
      background: scrolled?'rgba(8,12,24,0.85)':'transparent',
      backdropFilter: scrolled?'blur(24px)':'none',
      WebkitBackdropFilter: scrolled?'blur(24px)':'none',
      borderBottom: scrolled?'1px solid var(--border)':'none',
      transition:'all 0.3s',
    }}>
      <button onClick={()=>scroll('home')} data-hover
        style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'1rem',color:'var(--text)',background:'none',border:'none',cursor:'pointer',letterSpacing:'-0.02em'}}>
        DM<span style={{color:'var(--accent)'}}>.</span>
      </button>
      <div style={{display:'flex',alignItems:'center',gap:4}}>
        {NAV_ITEMS.map(id=>(
          <button key={id} onClick={()=>scroll(id)} data-hover
            style={{
              background: active===id?'var(--accent-bg)':'transparent',
              border:'none',borderRadius:8,padding:'5px 12px',cursor:'pointer',
              fontFamily:'JetBrains Mono',fontSize:'0.65rem',letterSpacing:'0.1em',textTransform:'uppercase',
              color: active===id?'var(--accent)':'var(--muted)',
              transition:'all 0.2s',
            }}
          >{id}</button>
        ))}
      </div>
      <ThemeSwitcher theme={theme} setTheme={setTheme}/>
    </nav>
  );
}

// ── MAIN APP ──────────────────────────────────────────
function App(){
  const [theme,setTheme]=useState('dark');
  const [active,setActive]=useState('home');
  useCursor();

  useEffect(()=>{
    document.body.setAttribute('data-theme',theme);
  },[theme]);

  // Active section tracker
  useEffect(()=>{
    const sections=['about','skills','work','projects','education'];
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting)setActive(e.target.id);});
    },{threshold:0.3});
    sections.forEach(id=>{ const el=document.getElementById(id); if(el)obs.observe(el); });
    const heroObs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setActive('home');},{threshold:0.5});
    const hero=document.getElementById('home-hero');
    if(hero)heroObs.observe(hero);
    return ()=>obs.disconnect();
  },[]);

  const cx={maxWidth:880,margin:'0 auto',padding:'0 28px'};
  const sec={padding:'80px 0'};

  return (
    <>
      <Nav theme={theme} setTheme={setTheme} active={active}/>

      {/* Orbs */}
