// ── HOOKS ─────────────────────────────────────────────
function useScroll(){
  const [data,setData]=useState({y:0,progress:0,vh:0,dir:'down'});
  const prev=useRef(0);
  useEffect(()=>{
    const h=()=>{
      const y=window.scrollY;
      const vh=window.innerHeight;
      const max=document.documentElement.scrollHeight-vh;
      setData({y,progress:max>0?y/max:0,vh,dir:y>prev.current?'down':'up'});
      prev.current=y;
    };
    window.addEventListener('scroll',h,{passive:true});
    h();
    return()=>window.removeEventListener('scroll',h);
  },[]);
  return data;
}

function useReveal(threshold=0.15){
  const ref=useRef(null);
  const [visible,setVisible]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVisible(true);obs.unobserve(el);}},{threshold,rootMargin:'0px 0px -60px 0px'});
    obs.observe(el);
    return()=>obs.disconnect();
  },[threshold]);
  return[ref,visible];
}

function useMouse(){
  const [pos,setPos]=useState({x:0,y:0});
  useEffect(()=>{
    const h=e=>setPos({x:e.clientX,y:e.clientY});
    window.addEventListener('mousemove',h,{passive:true});
    return()=>window.removeEventListener('mousemove',h);
  },[]);
  return pos;
}

function useCursor(){
  useEffect(()=>{
    const dot=document.getElementById('cursor-dot');
    const ring=document.getElementById('cursor-ring');
    if(!dot||!ring)return;
    let mx=0,my=0,rx=0,ry=0;
    const move=e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';};
    const raf=()=>{rx+=(mx-rx)*0.1;ry+=(my-ry)*0.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(raf);};
    const over=e=>{if(e.target.closest('a,button,[data-hover]')){dot.classList.add('hovering');ring.classList.add('hovering');}};
    const out=()=>{dot.classList.remove('hovering');ring.classList.remove('hovering');};
    document.addEventListener('mousemove',move,{passive:true});
    document.addEventListener('mouseover',over);
    document.addEventListener('mouseout',out);
    requestAnimationFrame(raf);
    const mq=window.matchMedia('(pointer:coarse)');
    if(mq.matches){dot.style.display='none';ring.style.display='none';}
    return()=>{document.removeEventListener('mousemove',move);document.removeEventListener('mouseover',over);document.removeEventListener('mouseout',out);};
  },[]);
}

  const idx=THEMES.findIndex(t=>t.id===theme);
  const next=()=>{const n=THEMES[(idx+1)%THEMES.length];setTheme(n.id);};
  return(
    <button onClick={next} data-hover
      style={{width:32,height:32,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',
        background:'var(--surface)',border:'1px solid var(--border)',
        fontSize:'0.8rem',color:'var(--text)',transition:'all 0.2s',
        fontFamily:"'JetBrains Mono',monospace"}}>
      {THEMES[idx]?.icon}
    </button>
  );
}

function Terminal(){
  const[visible,setVisible]=useState([]);
  const[ref,isVis]=useReveal(0.2);
  const started=useRef(false);
  useEffect(()=>{
    if(isVis&&!started.current){started.current=true;TERMINAL_LINES.forEach(l=>{setTimeout(()=>setVisible(p=>[...p,l]),l.t);});}
  },[isVis]);
  const cm={accent:'var(--accent)',text:'var(--text)',muted:'var(--muted2)',green:'#4ade80'};
  return(
    <div ref={ref} style={{background:'var(--code-bg)',border:'1px solid var(--border)',borderRadius:12,padding:'18px 22px',
      fontFamily:"'JetBrains Mono',monospace",fontSize:'0.72rem',lineHeight:1.9,minHeight:200,

// ── GLASS CARD ────────────────────────────────────────
function Card({children,style={},hover=true,gradient=false,className=''}){
  const[h,setH]=useState(false);
  return(
    <div className={className}
      onMouseEnter={()=>hover&&setH(true)} onMouseLeave={()=>setH(false)}
      style={{
        position:'relative',borderRadius:16,overflow:'hidden',
        background:h?'var(--surface2)':'var(--surface)',
        border:`1px solid ${h?'var(--border-h)':'var(--border)'}`,
        backdropFilter:'blur(16px)',
        transition:'all 0.35s cubic-bezier(0.22,1,0.36,1)',
        transform:h?'translateY(-3px)':'none',
        boxShadow:h?'0 20px 60px rgba(0,0,0,0.15)':'none',
        ...style,
      }}>
      {/* Gradient border glow on hover */}
      {gradient&&h&&<div style={{position:'absolute',inset:-1,borderRadius:17,padding:1,
        background:'var(--gradient)',backgroundSize:'200% 200%',animation:'gradientShift 3s ease infinite',
        WebkitMask:'linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0)',
        WebkitMaskComposite:'xor',maskComposite:'exclude',opacity:0.5,pointerEvents:'none'}}/>}
      {children}
    </div>
  );
}

// ── PROJECTS ──────────────────────────────────────────
function Projects(){
  const[repos,setRepos]=useState([]);
  const[loading,setLoading]=useState(true);
  const[err,setErr]=useState(false);
  useEffect(()=>{
    fetch('https://api.github.com/users/deecodek/repos?sort=updated&per_page=20&type=public')
      .then(r=>r.json())
      .then(data=>{
        if(Array.isArray(data)&&data.length>0)setRepos(data.filter(r=>!r.fork).slice(0,8));
        else{setRepos(STATIC_PROJECTS);setErr(true);}
        setLoading(false);
      }).catch(()=>{setRepos(STATIC_PROJECTS);setErr(true);setLoading(false);});
  },[]);
  const lc={PHP:'#4f5d95',Python:'#3572A5',JavaScript:'#f1e05a',TypeScript:'#3178c6',HTML:'#e34c26',default:'var(--muted)'};

      <div style={{display:'inline-block',width:20,height:20,border:'2px solid var(--border)',borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin 0.8s linear infinite',marginBottom:10}}/>
      <br/><Mono>fetching repos...</Mono>
    </div>
  );
  return(
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:16}}>
      {repos.map((r,i)=>(
        <Reveal key={i} delay={i*0.06}>

            <Card gradient style={{padding:'28px 28px 24px',height:'100%',display:'flex',flexDirection:'column',gap:12}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <Mono style={{fontSize:'0.62rem',color:'var(--muted)',letterSpacing:'0.06em'}}>{String(r.stargazers_count||0).padStart(2,'0')} ★</Mono>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7 17 10-10M7 7h10v10"/></svg>

              <p style={{fontSize:'0.75rem',color:'var(--muted2)',lineHeight:1.65,flex:1}}>{r.description||'No description.'}</p>
              <div style={{display:'flex',flexWrap:'wrap',gap:5,marginTop:4}}>

// ── APP ───────────────────────────────────────────────
function App(){
  const[theme,setTheme]=useState('dark');
  const[active,setActive]=useState('home');
  const{y:scrollY,progress}=useScroll();
  useCursor();

  useEffect(()=>{document.body.setAttribute('data-theme',theme);},[theme]);

  useEffect(()=>{
    const ids=['about','skills','work','projects','education'];
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting)setActive(e.target.id);});
    },{threshold:0.2});
    ids.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});
    const heroObs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setActive('home');},{threshold:0.4});
    const hero=document.getElementById('home-hero');
    if(hero)heroObs.observe(hero);
    return()=>{obs.disconnect();heroObs.disconnect();};
  },[]);

  return(
    <>
      <ScrollProgress progress={progress}/>
      <Background scrollY={scrollY}/>
      <Navbar theme={theme} setTheme={setTheme} active={active} scrollY={scrollY}/>
      <SideNav active={active}/>

      <div style={{position:'relative',zIndex:1}}>
        <Hero scrollY={scrollY}/>

        <Divider style={{margin:'0 auto'}}/>
        <About/>

        <Divider style={{margin:'0 auto'}}/>
        <SkillsSection/>

        <Divider style={{margin:'0 auto'}}/>
        <Work/>

        <Divider style={{margin:'0 auto'}}/>
        <ProjectsSection/>

        <Divider style={{margin:'0 auto'}}/>
        <Education/>

        <Footer/>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
